# Offline structure/integrity gates (backlog 5-13).
#
# Scope: repo-deterministic gates only. Track A's real verify (vsp against a
# live SAP system) CANNOT run here - the runner has no vsp binary, credentials,
# or network to the SAP box; those stay local/escorted (HANDOFF 5-13).
# doctor.mjs is intentionally excluded: it is a machine-local diagnostic
# (installed CLI versions, plugin install, hook wiring) - meaningless on a
# runner. Run it locally instead.
#
# Empirically validated (2026-07-14) against a clean autocrlf=false checkout:
# all five gates pass, so no .gitattributes / npm install is needed (the
# keyring runtime-deps are vendored in the repo).
name: offline-gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # exit 1 = unclassified/missing destination (blocking);
      # exit 2 = dead rules only (non-blocking warning, per CLAUDE.md);
      # exit 0 = clean.
      - name: check-migration-coverage
        run: |
          node interactive/scripts/check-migration-coverage.mjs || {
            code=$?
            if [ "$code" -eq 2 ]; then
              echo "::warning::check-migration-coverage exit 2 (dead rules, non-blocking)"
            else
              exit "$code"
            fi
          }

      - name: check-links
        run: node interactive/scripts/check-links.mjs interactive

      - name: verify-engine (bundle integrity)
        run: node interactive/server/verify-engine.mjs

      - name: smoke-mcp (tool surface)
        run: node interactive/scripts/smoke-mcp.mjs

      - name: review-verdict checker tests
        shell: pwsh
        run: ./scripts/test-check-review-verdict.ps1
