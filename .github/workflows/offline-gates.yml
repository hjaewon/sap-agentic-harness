# Offline structure/integrity gates (backlog 5-13).
#
# Scope: repo-self-contained gates only. Two local-only gates are intentionally
# EXCLUDED because they read state that does not exist on a runner:
#   - check-migration-coverage.mjs -> scans the external frozen source repo
#     sc4sap-custom (absolute local path SC4SAP_SRC); absent in CI -> crash.
#   - doctor.mjs -> machine-local diagnostic (installed CLI versions, plugin
#     install, hook wiring); meaningless on a runner.
# Run both locally instead (CLAUDE.md gate list).
#
# Track A's real verify (vsp against a live SAP system) also CANNOT run here -
# the runner has no vsp binary, credentials, or network to the SAP box; those
# stay local/escorted (HANDOFF 5-13).
#
# Two jobs, split by native runtime:
#   node-gates (ubuntu) - check-links, verify-engine, smoke-mcp. Repo-self-
#     contained (relative paths, vendored keyring incl. linux-x64-gnu prebuild).
#   ps-gate (windows) - the review-verdict checker test drives the real checker
#     the way the ENGINE does (Windows powershell.exe, backslash fixture paths);
#     it is Windows-native by design, so it runs on windows-latest rather than
#     being ported to Linux pwsh.
name: offline-gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  node-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: check-links
        run: node interactive/scripts/check-links.mjs interactive

      - name: verify-engine (bundle integrity)
        run: node interactive/server/verify-engine.mjs

      - name: smoke-mcp (tool surface)
        run: node interactive/scripts/smoke-mcp.mjs

  ps-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: review-verdict checker tests
        shell: powershell
        run: .\scripts\test-check-review-verdict.ps1
